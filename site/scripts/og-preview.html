<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:760px}
  body{background:#e9edf2;font-family:"Hanken Grotesk",-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;gap:60px}
  .col{display:flex;flex-direction:column;gap:22px}
  .lab{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#8a93a0;text-align:center;margin-bottom:2px}

  /* Slack/Discord-style large card */
  .card{width:440px;background:#fff;border:1px solid #dfe3e8;border-radius:14px;overflow:hidden;box-shadow:0 6px 24px rgba(20,30,50,.1)}
  .card img{width:100%;height:auto;display:block;border-bottom:1px solid #eef1f4}
  .card .meta{padding:14px 16px 16px}
  .card .dom{font-size:12.5px;color:#8a93a0;margin-bottom:5px}
  .card .ttl{font-size:16px;font-weight:700;color:#1d2330;line-height:1.3;margin-bottom:5px}
  .card .desc{font-size:13.5px;color:#5b6473;line-height:1.45}

  /* iMessage-style bubble */
  .imsg{width:340px}
  .bubble{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 10px rgba(20,30,50,.12)}
  .bubble img{width:100%;display:block}
  .bubble .m{padding:11px 14px 13px;background:#f5f6f8}
  .bubble .t{font-size:14.5px;font-weight:700;color:#1d2330;line-height:1.3}
  .bubble .d{font-size:12.5px;color:#8a93a0;margin-top:3px}
  .tail{font-size:12px;color:#aab0ba;text-align:right;margin-top:6px;padding-right:6px}
</style>
</head>
<body>
  <div class="col imsg">
    <div class="lab">iMessage / SMS</div>
    <div class="bubble">
      <img src="file:///C:/KBCafe/site/public/og.png" alt="" />
      <div class="m">
        <div class="t">KB Cafe — a developer&rsquo;s knowledge base</div>
        <div class="d">kbcafe.com</div>
      </div>
    </div>
    <div class="tail">Delivered</div>
  </div>

  <div class="col">
    <div class="lab">Slack / Discord / LinkedIn</div>
    <div class="card">
      <img src="file:///C:/KBCafe/site/public/og.png" alt="" />
      <div class="meta">
        <div class="dom">kbcafe.com</div>
        <div class="ttl">KB Cafe — a developer&rsquo;s knowledge base</div>
        <div class="desc">Fast, clean developer tools and quick references — freshly brewed. Everything runs in your browser: nothing uploaded, nothing tracked.</div>
      </div>
    </div>
  </div>
</body>
</html>
